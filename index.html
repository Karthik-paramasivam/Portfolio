<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { poppins: ['Poppins','sans-serif'] },
      colors: {
        bg:     '#020816',
        surface:'#050f27',
        card:   '#071232',
        cardHov:'#0c1a45',
        teal:   '#4f8ef7',
        tealD:  '#2563eb',
        tealDim:'rgba(79,142,247,0.12)',
        cyan:   '#818cf8',
        gold:   '#f59e0b',
        rose:   '#fb7185',
        muted:  '#64748b',
        dim:    '#94a3b8',
        bright: '#e8f0ff',
        line:   'rgba(79,142,247,0.15)',
      },
      boxShadow: {
        teal:   '0 0 30px rgba(79,142,247,0.28)',
        tealLg: '0 0 60px rgba(79,142,247,0.20)',
        card:   '0 8px 40px rgba(0,0,0,0.55)',
      }
    }
  }
}

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--teal:#4f8ef7;--gold:#f59e0b;}
html{scroll-behavior:smooth;}
body{font-family:'Poppins',sans-serif;background:#020816;color:#e8f0ff;overflow-x:hidden;cursor:none;}
::selection{background:#4f8ef7;color:#fff;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:#020816;}
::-webkit-scrollbar-thumb{background:#4f8ef7;border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:#818cf8;}
#cursor{position:fixed;width:10px;height:10px;border-radius:50%;background:#4f8ef7;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s;}
#cursor-ring{position:fixed;width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(79,142,247,.5);pointer-events:none;z-index:9998;transform:translate(-50%,-50%);}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:160px;opacity:.022;pointer-events:none;z-index:998;}
.orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;}
.orb1{width:700px;height:700px;background:rgba(37,99,235,.09);top:-200px;left:-200px;}
.orb2{width:500px;height:500px;background:rgba(124,58,237,.07);bottom:-100px;right:-100px;}
.orb3{width:400px;height:400px;background:rgba(79,142,247,.05);top:50%;left:50%;transform:translate(-50%,-50%);}
.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(79,142,247,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(79,142,247,.04) 1px,transparent 1px);background-size:55px 55px;mask-image:radial-gradient(ellipse 80% 60% at 50% 0%,black 40%,transparent 100%);}
.nav-glass{background:rgba(2,8,22,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(79,142,247,.14);}
.hero-gradient{background:linear-gradient(135deg,#4f8ef7 0%,#818cf8 45%,#2563eb 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.gold-gradient{background:linear-gradient(135deg,#f59e0b,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.type-cursor::after{content:'|';color:#4f8ef7;animation:blink .8s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.reveal{opacity:0;transform:translateY(40px);}
.reveal-left{opacity:0;transform:translateX(-40px);}
.reveal-scale{opacity:0;transform:scale(.9);}
.skill-bar-bg{background:rgba(79,142,247,.08);border-radius:4px;overflow:hidden;}
.skill-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#2563eb,#818cf8);width:0%;transition:width 1.5s cubic-bezier(.16,1,.3,1);position:relative;}
.skill-bar-fill::after{content:'';position:absolute;right:0;top:-3px;width:10px;height:10px;border-radius:50%;background:#4f8ef7;box-shadow:0 0 10px #4f8ef7;}
.exp-tab.active{color:#4f8ef7;border-left-color:#4f8ef7;background:rgba(79,142,247,.07);}
.exp-tab{border-left:2px solid rgba(255,255,255,.08);transition:all .3s;cursor:pointer;}
.proj-card{background:linear-gradient(135deg,rgba(7,18,50,.9),rgba(5,15,39,.95));border:1px solid rgba(79,142,247,.13);transition:all .4s cubic-bezier(.16,1,.3,1);}
.proj-card:hover{border-color:rgba(79,142,247,.45);transform:translateY(-8px);box-shadow:0 24px 60px rgba(79,142,247,.13),0 0 0 1px rgba(79,142,247,.1);}
.proj-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(79,142,247,.06),transparent);opacity:0;transition:opacity .4s;border-radius:inherit;}
.proj-card:hover::before{opacity:1;}
.tech-badge{background:rgba(79,142,247,.08);border:1px solid rgba(79,142,247,.18);transition:all .25s;}
.tech-badge:hover{background:rgba(79,142,247,.18);border-color:rgba(79,142,247,.5);transform:translateY(-2px);box-shadow:0 4px 20px rgba(79,142,247,.22);}
.contact-card{background:rgba(5,15,39,.8);border:1px solid rgba(79,142,247,.13);transition:all .3s;}
.contact-card:hover{border-color:rgba(79,142,247,.42);transform:translateY(-4px);box-shadow:0 12px 40px rgba(79,142,247,.14);}
@keyframes marqueeAnim{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.marquee-inner{animation:marqueeAnim 25s linear infinite;display:flex;width:max-content;}
.stat-card{background:linear-gradient(135deg,rgba(79,142,247,.07),rgba(7,18,50,.85));border:1px solid rgba(79,142,247,.16);}
.timeline-dot{width:12px;height:12px;border-radius:50%;background:#4f8ef7;box-shadow:0 0 12px #4f8ef7,0 0 24px rgba(79,142,247,.45);}
.btn-teal{background:linear-gradient(135deg,#2563eb,#4f8ef7);color:#fff;font-weight:700;transition:all .3s;position:relative;overflow:hidden;}
.btn-teal::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.18),transparent);opacity:0;transition:opacity .3s;}
.btn-teal:hover::before{opacity:1;}
.btn-teal:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(37,99,235,.5);}
.btn-outline-teal{border:1.5px solid rgba(79,142,247,.5);color:#4f8ef7;transition:all .3s;}
.btn-outline-teal:hover{background:rgba(79,142,247,.1);border-color:#4f8ef7;transform:translateY(-2px);}
.sec-label{color:#4f8ef7;font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;display:flex;align-items:center;gap:.75rem;}
.sec-label::before{content:'';width:32px;height:1.5px;background:linear-gradient(90deg,#4f8ef7,transparent);}
.sec-label::after{content:'';flex:0 0 32px;height:1.5px;background:linear-gradient(270deg,#4f8ef7,transparent);}
.float-tag{animation:floatY 4s ease-in-out infinite;}
.float-tag:nth-child(2){animation-delay:-1.3s;}
.float-tag:nth-child(3){animation-delay:-2.6s;}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.nav-link-active{color:#4f8ef7 !important;}
.progress-ring circle{transition:stroke-dashoffset 1.5s cubic-bezier(.16,1,.3,1);}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ── EXTRA ANIMATIONS ── */
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
.shimmer-text{background:linear-gradient(90deg,#4f8ef7,#818cf8,#2563eb,#4f8ef7);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s linear infinite;}

/* Pulse border on cards */
@keyframes borderPulse{0%,100%{box-shadow:0 0 0 0 rgba(79,142,247,.0)}50%{box-shadow:0 0 0 4px rgba(79,142,247,.08)}}
.stat-card{animation:borderPulse 3.5s ease-in-out infinite;}

/* Floating orbs gentle drift */
@keyframes orbDrift1{0%,100%{transform:translateY(0) translateX(0)}33%{transform:translateY(-30px) translateX(20px)}66%{transform:translateY(20px) translateX(-15px)}}
@keyframes orbDrift2{0%,100%{transform:translateY(0) translateX(0)}33%{transform:translateY(25px) translateX(-20px)}66%{transform:translateY(-20px) translateX(15px)}}
.orb1{animation:orbDrift1 18s ease-in-out infinite;}
.orb2{animation:orbDrift2 22s ease-in-out infinite;}

/* Gradient border glow on hover cards */
.about-minicard{position:relative;}
.about-minicard::after{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,rgba(79,142,247,.25),rgba(124,58,237,.15),transparent);opacity:0;transition:opacity .4s;pointer-events:none;}
.about-minicard:hover::after{opacity:1;}

/* Section entrance — slide + fade with stagger support */
.section-fade-up{opacity:0;transform:translateY(50px);transition:opacity .8s cubic-bezier(.16,1,.3,1),transform .8s cubic-bezier(.16,1,.3,1);}
.section-fade-up.visible{opacity:1;transform:translateY(0);}

/* Glow pulse on timeline dot */
@keyframes dotPulse{0%,100%{box-shadow:0 0 12px #4f8ef7,0 0 24px rgba(79,142,247,.45)}50%{box-shadow:0 0 20px #4f8ef7,0 0 40px rgba(79,142,247,.7),0 0 60px rgba(79,142,247,.2)}}
.timeline-dot{animation:dotPulse 2.5s ease-in-out infinite;}


/* Tech badge shimmer sweep */
.tech-badge{overflow:hidden;position:relative;}
.tech-badge::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);transition:left .5s;}
.tech-badge:hover::after{left:140%;}

/* Nav link underline slide */
.nav-link{position:relative;}
.nav-link::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:1.5px;background:#4f8ef7;transition:width .3s ease;}
.nav-link:hover::after,.nav-link-active::after{width:100%;}

/* Gradient ring spin on KP avatar */
@keyframes ringRotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.kp-ring-outer{animation:ringRotate 12s linear infinite;}
.kp-ring-inner{animation:ringRotate 8s linear infinite reverse;}

/* Contact card reveal */
@keyframes slideUpFade{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.contact-reveal{animation:slideUpFade .6s cubic-bezier(.16,1,.3,1) both;}

/* Bounce in for stat numbers */
@keyframes bounceIn{0%{opacity:0;transform:scale(.5)}70%{transform:scale(1.1)}100%{opacity:1;transform:scale(1)}}
.stat-num-anim{animation:bounceIn .7s cubic-bezier(.34,1.56,.64,1) both;}

.card-anim{transition:transform .35s cubic-bezier(.16,1,.3,1),box-shadow .35s;}
.card-anim:hover{transform:translateY(-5px) scale(1.02);}
.tech-badge-faded{opacity:.35;filter:grayscale(.6);transition:all .3s;}
.tech-badge-faded:hover{opacity:.7;filter:grayscale(.2);transform:translateY(-2px);}

/* ── MAGNETIC BUTTON ────────────────────────── */
.mag-btn{transition:box-shadow .25s;}

/* ── HERO NAME UNDERLINE GLOW ────────────────── */
.name-underline{
  display:block;height:3px;width:0;margin-top:.35rem;
  background:linear-gradient(90deg,#2563eb,#4f8ef7,#818cf8,transparent);
  border-radius:2px;
  transition:width 1s cubic-bezier(.16,1,.3,1);
  box-shadow:0 0 12px rgba(79,142,247,.6);
}
.name-underline.show{width:100%;}

/* ── SHIMMER TEXT (already exists, ensure it renders) ── */
.shimmer-text{
  background:linear-gradient(90deg,#4f8ef7,#818cf8,#60a5fa,#4f8ef7);
  background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 4s linear infinite;
}

/* ── FLOATING BADGE INDIVIDUAL ANIMATIONS ────── */
.fbadge-0{animation:floatY 4.2s ease-in-out infinite;}
.fbadge-1{animation:floatY 5.1s ease-in-out infinite;animation-delay:-1.7s;}
.fbadge-2{animation:floatY 3.8s ease-in-out infinite;animation-delay:-3s;}
.fbadge-3{animation:floatY 5.6s ease-in-out infinite;animation-delay:-.9s;}

/* ── STAT CARD HOVER LIFT ────────────────────── */
.stat-card{
  transition:transform .3s cubic-bezier(.16,1,.3,1),box-shadow .3s,border-color .3s;
  cursor:default;
}
.stat-card:hover{
  transform:translateY(-6px) scale(1.04);
  box-shadow:0 16px 40px rgba(79,142,247,.22);
  border-color:rgba(79,142,247,.45);
}

/* ── HERO SCROLL CUE PULSE ───────────────────── */
@keyframes scrollCue{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(6px);opacity:1}}
.scroll-cue-line{animation:scrollCue 2s ease-in-out infinite;}

/* ── AVAILABLE DOT RIPPLE ────────────────────── */
@keyframes ripple{0%{transform:scale(1);opacity:.6}100%{transform:scale(2.8);opacity:0}}
.avail-ripple{
  position:absolute;inset:0;border-radius:50%;
  background:#4f8ef7;animation:ripple 2s ease-out infinite;
}

@media(hover:none){#cursor,#cursor-ring{display:none;}body{cursor:auto;}}
@media(max-width:480px){
  #cursor,#cursor-ring{display:none !important;}body{cursor:auto;}
  .orb1{width:220px;height:220px;top:-60px;left:-60px;}.orb2{width:180px;height:180px;}
  section{padding-top:3rem !important;padding-bottom:3rem !important;}
  #hero-title h1{font-size:1.85rem !important;line-height:1.08 !important;}
  #hero-ctas{gap:.5rem !important;}#hero-ctas a{padding:.6rem 1rem !important;font-size:.65rem !important;}
  .skills-grid{grid-template-columns:repeat(3,1fr) !important;}
  .proj-carousel-item{min-width:calc(100vw - 2.5rem) !important;max-width:calc(100vw - 2.5rem) !important;}
  .ai-band-grid{grid-template-columns:repeat(2,1fr) !important;}.edu-grid{grid-template-columns:1fr !important;}
}
@media(min-width:481px) and (max-width:768px){
  #cursor,#cursor-ring{display:none !important;}body{cursor:auto;}
  .orb1{width:280px;height:280px;top:-80px;left:-80px;}.orb2{width:240px;height:240px;}
  section{padding-top:3.5rem !important;padding-bottom:3.5rem !important;}
  #hero-title h1{font-size:2.2rem !important;line-height:1.05 !important;}
  .proj-carousel-item{min-width:300px !important;max-width:300px !important;}
  .ai-band-grid{grid-template-columns:repeat(2,1fr) !important;}
}
@media(min-width:769px) and (max-width:1024px){
  section{padding-top:4rem !important;padding-bottom:4rem !important;}
  #hero-title h1{font-size:2.8rem !important;}
}
@media(max-width:768px){.marquee-inner{animation-duration:38s;}.stat-card{padding:.65rem .4rem !important;}}

/* ═══════════════════════════════════════════════
   3D CARD TILT SYSTEM
═══════════════════════════════════════════════ */
.tilt-card {
  transform-style: preserve-3d;
  will-change: transform;
}
.tilt-shine {
  position:absolute;inset:0;border-radius:inherit;
  pointer-events:none;z-index:8;opacity:0;
  transition:opacity .3s;
  background:radial-gradient(circle at 50% 50%, rgba(255,255,255,.13) 0%, transparent 60%);
}

/* ═══════════════════════════════════════════════
   FLOATING GEOMETRIC PARTICLES (replaces stars)
═══════════════════════════════════════════════ */
.geo-particle {
  position:fixed;pointer-events:none;z-index:0;
  animation:geoFloat var(--dur,8s) ease-in-out infinite;
  animation-delay:var(--del,0s);
  opacity:var(--op,.18);
}
@keyframes geoFloat {
  0%   { transform:translateY(0)   translateX(0)    rotate(0deg);   }
  25%  { transform:translateY(-28px) translateX(14px)  rotate(45deg);  }
  50%  { transform:translateY(-18px) translateX(-10px) rotate(90deg);  }
  75%  { transform:translateY(-32px) translateX(18px)  rotate(135deg); }
  100% { transform:translateY(0)   translateX(0)    rotate(180deg); }
}
@keyframes geoFloatB {
  0%   { transform:translateY(0)   translateX(0)   rotate(0deg);   opacity:var(--op,.12); }
  33%  { transform:translateY(22px)  translateX(-16px) rotate(-60deg); opacity:calc(var(--op)*1.6); }
  66%  { transform:translateY(-14px) translateX(20px)  rotate(-120deg);opacity:var(--op,.12); }
  100% { transform:translateY(0)   translateX(0)   rotate(-180deg);opacity:var(--op,.12); }
}
@keyframes geoFloatC {
  0%,100%{ transform:translateY(0) scale(1)   rotate(0deg);  opacity:var(--op); }
  50%    { transform:translateY(-20px) scale(1.15) rotate(72deg); opacity:calc(var(--op)*2); }
}

/* ═══════════════════════════════════════════════
   ANIMATED GRADIENT MESH BACKGROUND LAYER
═══════════════════════════════════════════════ */
#mesh-bg {
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 50% at 20% 20%, rgba(37,99,235,.07) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 80% 80%, rgba(124,58,237,.06) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 60% 10%, rgba(79,142,247,.05) 0%, transparent 70%);
  animation:meshShift 18s ease-in-out infinite alternate;
}
@keyframes meshShift {
  0%   { background-position:0% 0%,   100% 100%, 60% 10%; }
  50%  { background-position:30% 20%, 70%  80%,  80% 30%; }
  100% { background-position:10% 40%, 90%  60%,  40% 60%; }
}

/* ═══════════════════════════════════════════════
   ABOUT MINICARD 3D
═══════════════════════════════════════════════ */
.about-minicard {
  transform-style:preserve-3d;
  will-change:transform;
  position:relative;
  overflow:hidden;
}

/* ═══════════════════════════════════════════════
   SKILL TECH BADGE 3D
═══════════════════════════════════════════════ */
.tech-reveal {
  transform-style:preserve-3d;
  will-change:transform;
}

/* ═══════════════════════════════════════════════
   EXPERIENCE PANEL 3D
═══════════════════════════════════════════════ */
.exp-panel-3d {
  transform-style:preserve-3d;
  will-change:transform;
  position:relative;
  overflow:hidden;
}

/* ═══════════════════════════════════════════════
   PROJECT CARD 3D
═══════════════════════════════════════════════ */
.proj-carousel-item {
  transform-style:preserve-3d;
  will-change:transform;
}

/* ═══════════════════════════════════════════════
   EDUCATION CARD 3D
═══════════════════════════════════════════════ */
.edu-tilt {
  transform-style:preserve-3d;
  will-change:transform;
  position:relative;
  overflow:hidden;
}

/* ═══════════════════════════════════════════════
   CONTACT CARD 3D
═══════════════════════════════════════════════ */
.contact-card {
  transform-style:preserve-3d;
  will-change:transform;
}

</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>
<div id="scroll-progress" style="position:fixed;top:0;left:0;height:2px;width:0%;background:linear-gradient(90deg,#2563eb,#4f8ef7,#f59e0b);z-index:9997;transition:none;"></div>
<div id="mesh-bg"></div>
<div id="geo-particles"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="grid-bg"></div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ══════════════════ TECH ICONS MAP ══════════════════ */
const TECH_ICONS = {
  'React':      { icon: 'fab fa-react',        color: '#61dafb' },
  'JavaScript': { icon: 'fab fa-js-square',     color: '#f7df1e' },
  'HTML5':      { icon: 'fab fa-html5',         color: '#e34f26' },
  'CSS3':       { icon: 'fab fa-css3-alt',      color: '#1572b6' },
  'Bootstrap':  { icon: 'fab fa-bootstrap',     color: '#7952b3' },
  'Git':        { icon: 'fab fa-git-alt',       color: '#f05032' },
  'GitHub':     { icon: 'fab fa-github',        color: '#e2e8f0' },
  'Node.js':    { icon: 'fab fa-node-js',       color: '#339933' },
  'npm':        { icon: 'fab fa-npm',           color: '#cb3837' },
  'SharePoint': { icon: 'fab fa-microsoft',     color: '#0078d4' },
  'TypeScript': { icon: 'fas fa-code',          color: '#3178c6' },
  'SPFx':       { icon: 'fab fa-microsoft',     color: '#0078d4' },
  'PnPjs':      { icon: 'fas fa-puzzle-piece',  color: '#0078d4' },
  'REST API':   { icon: 'fas fa-plug',          color: '#4f8ef7' },
  'Ant Design': { icon: 'fas fa-palette',       color: '#1890ff' },
  'Tailwind':   { icon: 'fas fa-wind',          color: '#38bdf8' },

/* ══════════════════ CURSOR ══════════════════ */
function Cursor() {
  const dot = useRef(null), ring = useRef(null);
  const pos = useRef({ x:0, y:0 }), rp = useRef({ x:0, y:0 });
  useEffect(() => {
    const mv = e => {
      pos.current = { x: e.clientX, y: e.clientY };
      if (dot.current) { dot.current.style.left=e.clientX+'px'; dot.current.style.top=e.clientY+'px'; }
    };
    let raf;
    const loop = () => {
      rp.current.x += (pos.current.x - rp.current.x) * .12;
      rp.current.y += (pos.current.y - rp.current.y) * .12;
      if (ring.current) { ring.current.style.left=rp.current.x+'px'; ring.current.style.top=rp.current.y+'px'; }
      raf = requestAnimationFrame(loop);
    };
    window.addEventListener('mousemove', mv);
    loop();
    return () => { window.removeEventListener('mousemove', mv); cancelAnimationFrame(raf); };
  }, []);
  return null;
}

/* ══════════════════ TYPING EFFECT ══════════════════ */
function TypeWriter({ words }) {
  const [text, setText] = useState('');
  const [wi, setWi] = useState(0);
  const [ci, setCi] = useState(0);
  const [del, setDel] = useState(false);
  useEffect(() => {
    const w = words[wi];
    const speed = del ? 60 : 110;
    const t = setTimeout(() => {
      if (!del) {
        setText(w.slice(0, ci+1));
        if (ci+1 === w.length) setTimeout(() => setDel(true), 1600);
        else setCi(c => c+1);
      } else {
        setText(w.slice(0, ci-1));
        if (ci-1 === 0) { setDel(false); setWi(w2 => (w2+1) % words.length); setCi(0); }
        else setCi(c => c-1);
      }
    }, speed);
    return () => clearTimeout(t);
  }, [text, wi, ci, del]);
  return <span className="type-cursor text-teal font-semibold">{text}</span>;
}

/* ══════════════════ APP ══════════════════ */
function App() {
  useEffect(() => {
    // Custom cursor
    const dot = document.getElementById('cursor');
    const ring = document.getElementById('cursor-ring');
    const pos = { x:0, y:0 }, rp = { x:0, y:0 };
    const mv = e => { pos.x = e.clientX; pos.y = e.clientY; dot.style.left=e.clientX+'px'; dot.style.top=e.clientY+'px'; };
    let raf;
    const loop = () => {
      rp.x += (pos.x - rp.x) * .12; rp.y += (pos.y - rp.y) * .12;
      ring.style.left=rp.x+'px'; ring.style.top=rp.y+'px';
      raf = requestAnimationFrame(loop);
    };
    window.addEventListener('mousemove', mv); loop();

    // ── Geometric floating particles (triangles, diamonds, rings) ──
    const geoContainer = document.getElementById('geo-particles');
    if (geoContainer) {
      const shapes = [
        // SVG path, size range, color options, count
        { type:'ring',    count:14 },
        { type:'tri',     count:10 },
        { type:'diamond', count:10 },
        { type:'dot',     count:8  },
      ];
      const colors = [
        'rgba(79,142,247,VAL)','rgba(124,58,237,VAL)',
        'rgba(129,140,248,VAL)','rgba(37,99,235,VAL)',
      ];
      let total = 0;
      shapes.forEach(({ type, count }) => {
        for (let i = 0; i < count; i++) {
          const el = document.createElementNS('http://www.w3.org/2000/svg','svg');
          const size = Math.random()*18+8;
          const op   = (Math.random()*.18+.05).toFixed(2);
          const col  = colors[Math.floor(Math.random()*colors.length)].replace('VAL', op);
          const dur  = (Math.random()*12+6).toFixed(1);
          const del  = -(Math.random()*14).toFixed(1);
          const animName = total%3===0 ? 'geoFloat' : total%3===1 ? 'geoFloatB' : 'geoFloatC';
          el.setAttribute('width', size);
          el.setAttribute('height', size);
          el.setAttribute('viewBox','0 0 24 24');
          el.setAttribute('fill','none');
          el.style.cssText = `position:fixed;top:${Math.random()*100}%;left:${Math.random()*100}%;pointer-events:none;z-index:0;--dur:${dur}s;--del:${del}s;--op:${op};animation:${animName} ${dur}s ease-in-out infinite ${del}s;`;
          let path;
          if (type === 'ring') {
            path = document.createElementNS('http://www.w3.org/2000/svg','circle');
            path.setAttribute('cx','12');path.setAttribute('cy','12');path.setAttribute('r','9');
            path.setAttribute('stroke',col);path.setAttribute('stroke-width','1.5');
          } else if (type === 'tri') {
            path = document.createElementNS('http://www.w3.org/2000/svg','polygon');
            path.setAttribute('points','12,2 22,20 2,20');
            path.setAttribute('stroke',col);path.setAttribute('stroke-width','1.2');path.setAttribute('fill','none');
          } else if (type === 'diamond') {
            path = document.createElementNS('http://www.w3.org/2000/svg','polygon');
            path.setAttribute('points','12,2 22,12 12,22 2,12');
            path.setAttribute('stroke',col);path.setAttribute('stroke-width','1.2');path.setAttribute('fill','none');
          } else {
            path = document.createElementNS('http://www.w3.org/2000/svg','circle');
            path.setAttribute('cx','12');path.setAttribute('cy','12');path.setAttribute('r','3');
            path.setAttribute('fill',col);
          }
          el.appendChild(path);
          geoContainer.appendChild(el);
          total++;
        }
      });
    }

    // Cursor scale on interactive elements
    const onEnter = () => { dot.style.width='18px'; dot.style.height='18px'; dot.style.opacity='.6'; };
    const onLeave = () => { dot.style.width='10px'; dot.style.height='10px'; dot.style.opacity='1'; };
    document.querySelectorAll('a,button,[role="button"]').forEach(el => {
      el.addEventListener('mouseenter', onEnter);
      el.addEventListener('mouseleave', onLeave);
    });

    return () => {
      window.removeEventListener('mousemove', mv);
      cancelAnimationFrame(raf);
    };
  }, []);

  return (
    <div className="font-poppins">
      <Cursor />
      <Navbar />
      <Hero />
      <Marquee />
      <About />
      <Skills />
      <Experience />
      <Projects />
      <Education />
      <Contact />
    </div>
  );
}
